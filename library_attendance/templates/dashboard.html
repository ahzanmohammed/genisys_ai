<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Attendance Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f6f8fc; }
    .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 20px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #ececec; text-align: left; }
    .late { color: #c0392b; font-weight: bold; }
  </style>
</head>
<body>
  <h1>📚 Smart Library Attendance Dashboard</h1>

  <div class="card">
    <h2>Live Feed</h2>
    <table>
      <thead><tr><th>Time</th><th>Roll</th><th>Name</th><th>Action</th><th>Device</th><th>Late</th></tr></thead>
      <tbody id="liveRows"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Daily Report</h2>
    <label>Date: <input type="date" id="reportDate" value="{{ today }}"></label>
    <button onclick="loadReport()">Load Report</button>
    <p id="totals"></p>
    <pre id="reportOut"></pre>
  </div>

<script>
async function loadLive() {
  const res = await fetch('/api/live?limit=25');
  const data = await res.json();
  const tbody = document.getElementById('liveRows');
  tbody.innerHTML = data.events.map(e => `
    <tr>
      <td>${new Date(e.scanned_at).toLocaleString()}</td>
      <td>${e.roll_no}</td>
      <td>${e.full_name}</td>
      <td>${e.action}</td>
      <td>${e.device_id}</td>
      <td class="${e.is_late ? 'late':''}">${e.is_late ? 'YES' : 'NO'}</td>
    </tr>`).join('');
}

async function loadReport() {
  const date = document.getElementById('reportDate').value;
  const res = await fetch(`/api/report/daily?report_date=${date}`);
  const data = await res.json();
  document.getElementById('totals').textContent = `Total Visitors: ${data.total_visitors}`;
  document.getElementById('reportOut').textContent = JSON.stringify(data.records, null, 2);
}

loadLive();
loadReport();
setInterval(loadLive, 5000);
</script>
</body>
</html>
